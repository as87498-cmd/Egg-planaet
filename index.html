<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Egg Planet - Running Bill</title>
    <style>
        :root { --neon-purple: #bc13fe; --neon-blue: #0ff; --egg-yellow: #ffcc00; --bg-dark: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }
        
        #poster-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('eggplanet.png') no-repeat center center; background-size: 100% 100%; z-index: 2000; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 60px; box-sizing: border-box; transition: transform 0.6s ease-in-out; }
        .launch-btn { background: var(--neon-purple); color: white; border: 2px solid white; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px var(--neon-purple); }

        #menu-screen { padding: 20px; padding-bottom: 150px; display: none; }
        .header { text-align: center; border-bottom: 2px solid var(--neon-purple); padding-bottom: 10px; margin-bottom: 15px; }
        .header h1 { color: var(--egg-yellow); margin: 0; font-size: 2.2rem; }

        /* Running Bill Summary */
        .running-bill-box { background: #111; border: 1px dashed var(--neon-blue); padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 0.9rem; }
        .running-bill-box h4 { margin: 0 0 5px 0; color: var(--neon-blue); }

        .item-card { background: rgba(255,255,255,0.05); margin-bottom: 10px; padding: 12px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid rgba(188,19,254,0.2); }
        .qty-controls { display: flex; align-items: center; gap: 10px; background: #000; padding: 5px; border-radius: 8px; border: 1px solid #333; }
        .qty-btn { background: var(--neon-purple); border: none; color: white; width: 30px; height: 30px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .footer { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px 20px; border-top: 2px solid var(--neon-purple); box-sizing: border-box; z-index: 100; }
        .footer-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .total-price { font-size: 1.5rem; font-weight: bold; color: var(--egg-yellow); }
        .order-btn { background: #25D366; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.1rem; }
        .clear-btn { background: #444; color: #ccc; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="poster-screen">
        <button class="launch-btn" onclick="showMenu()">Explore Menu</button>
    </div>

    <div id="menu-screen">
        <div class="header">
            <h1>EGG PLANET</h1>
            <div id="table-display" style="color:var(--neon-blue); font-weight:bold;">Table: --</div>
        </div>

        <div class="running-bill-box" id="bill-box">
            <h4>Current Bill History:</h4>
            <div id="bill-history" style="color:#aaa;">No items ordered yet.</div>
        </div>

        <div id="menu-list"></div>
    </div>

    <div class="footer">
        <div class="footer-top">
            <div class="total-price">Total: ₹<span id="final-amt">0</span></div>
            <button class="clear-btn" onclick="clearBill()">New Session</button>
        </div>
        <button class="order-btn" onclick="sendWhatsApp()">🚀 Send Order</button>
    </div>

    <script>
        const phone = "919893201182";
        const items = [
            { n: "Plain Omlete", p: 50 }, { n: "Bread Omlete", p: 60 }, { n: "French Omlete", p: 70 },
            { n: "Kali Mirch Omlete", p: 80 }, { n: "Cheese Omlete", p: 90 }, { n: "Double Cheese Omlete", p: 100 },
            { n: "Desi Egg Omlete", p: 70 }, { n: "Desi Egg Bhurji", p: 80 }, { n: "2 Egg Bhurji", p: 70 },
            { n: "4 Egg Bhurji", p: 120 }, { n: "Egg Maggi", p: 50 }, { n: "Chicken Maggi", p: 100 },
            { n: "Omlete Burger", p: 50 }, { n: "Egg Pakora (pc)", p: 20 }, { n: "Boiled Egg", p: 10 }
        ];

        let currentCart = {}; // Jo abhi select kiya
        let savedOrders = JSON.parse(localStorage.getItem('savedOrders')) || []; // Jo pehle order kar chuke

        function showMenu() {
            document.getElementById('poster-screen').style.transform = 'translateY(-110%)';
            document.getElementById('menu-screen').style.display = 'block';
            updateUI();
        }

        const listDiv = document.getElementById('menu-list');
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-card';
            div.innerHTML = `
                <div><b>${item.n}</b><span>₹${item.p}</span></div>
                <div class="qty-controls">
                    <button class="qty-btn" onclick="changeQty('${item.n}', -1, ${item.p})">-</button>
                    <span id="qty-${item.n.replace(/\s+/g,'')}">0</span>
                    <button class="qty-btn" onclick="changeQty('${item.n}', 1, ${item.p})">+</button>
                </div>
            `;
            listDiv.appendChild(div);
        });

        function changeQty(name, val, price) {
            if(!currentCart[name]) currentCart[name] = {q: 0, p: price};
            currentCart[name].q += val;
            if(currentCart[name].q < 0) currentCart[name].q = 0;
            document.getElementById(`qty-${name.replace(/\s+/g,'')}`).innerText = currentCart[name].q;
            updateUI();
        }

        function updateUI() {
            let historyHTML = "";
            let totalAmt = 0;

            // Purana bill calculate karein
            savedOrders.forEach(order => {
                historyHTML += `• ${order.n} x ${order.q}<br>`;
                totalAmt += (order.q * order.p);
            });

            // Naya select kiya hua calculate karein
            for(let k in currentCart) {
                totalAmt += (currentCart[k].q * currentCart[k].p);
            }

            document.getElementById('bill-history').innerHTML = historyHTML || "No items ordered yet.";
            document.getElementById('final-amt').innerText = totalAmt;
        }

        function sendWhatsApp() {
            const urlParams = new URLSearchParams(window.location.search);
            const table = urlParams.get('table') || "Unknown";
            
            let newOrderText = "";
            let hasNewItem = false;

            for(let k in currentCart) {
                if(currentCart[k].q > 0) {
                    savedOrders.push({n: k, q: currentCart[k].q, p: currentCart[k].p});
                    newOrderText += `• ${k} x ${currentCart[k].q}%0A`;
                    hasNewItem = true;
                    // Reset qty in UI
                    document.getElementById(`qty-${k.replace(/\s+/g,'')}`).innerText = 0;
                }
            }

            if(!hasNewItem) return alert("Please select a new item to order!");

            localStorage.setItem('savedOrders', JSON.stringify(savedOrders));
            
            let fullMsg = `*🛸 EGG PLANET NEW ORDER*%0A*Table:* ${table}%0A---%0A*Items:*%0A${newOrderText}---%0A*Total Bill so far: ₹${document.getElementById('final-amt').innerText}*`;
            
            currentCart = {}; // Clear temporary selection
            updateUI();
            window.open(`https://wa.me/${phone}?text=${fullMsg}`, '_blank');
        }

        function clearBill() {
            if(confirm("Customer has paid? This will clear the bill.")) {
                localStorage.removeItem('savedOrders');
                savedOrders = [];
                currentCart = {};
                location.reload();
            }
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const table = urlParams.get('table');
            if(table) document.getElementById('table-display').innerText = "Table: " + table;
            updateUI();
        }
    </script>
</body>
</html>
